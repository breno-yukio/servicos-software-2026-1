# Frontend Gradio + backend FastAPI (Whisper)
services:
  gradio-service:
    image: mamazzei/gradio-json
    build:
      context: gradio-json
      dockerfile: Dockerfile
    ports:
      - 7860:7860
    environment:
      BACKEND_URL: http://backend-json:8080
      TRANSCRICAO_TIMEOUT: "600"
    depends_on:
      - backend-json

  backend-json:
    image: mamazzei/backend-json
    build:
      context: backend-json
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    environment:
      WHISPER_MODEL: base
